<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<!-- CTA Button -->
<th:block th:fragment="button(url, text)">
    <tr>
        <td style="padding: 0 32px 32px 32px;">
            <table role="presentation" width="100%" cellspacing="0" cellpadding="0">
                <tr>
                    <td align="center">
                        <a th:href="${url}" th:text="${text}" style="display: inline-block; padding: 12px 24px; font-size: 16px; font-weight: 500; color: #ffffff; background-color: #18181b; border-radius: 6px; text-decoration: none;">
                            Button
                        </a>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</th:block>

<!-- Alternative/Fallback Link -->
<th:block th:fragment="fallbackLink(url)">
    <tr>
        <td style="padding: 0 32px 32px 32px; border-top: 1px solid #e4e4e7;">
            <p style="margin: 24px 0 8px 0; font-size: 14px; line-height: 20px; color: #71717a;">
                If the button doesn't work, copy and paste this link into your browser:
            </p>
            <p style="margin: 0; font-size: 14px; line-height: 20px; word-break: break-all;">
                <a th:href="${url}" th:text="${url}" style="color: #2563eb; text-decoration: none;"></a>
            </p>
        </td>
    </tr>
</th:block>

<!-- Footer -->
<th:block th:fragment="footer(message)">
    <tr>
        <td style="padding: 24px 32px; background-color: #fafafa; border-radius: 0 0 8px 8px;">
            <p th:text="${message}" style="margin: 0; font-size: 12px; line-height: 16px; color: #a1a1aa; text-align: center;">
                Footer message
            </p>
        </td>
    </tr>
</th:block>

<!-- Expiration Notice -->
<th:block th:fragment="expirationNotice(hours)">
    <p style="margin: 0; font-size: 14px; line-height: 20px; color: #71717a;">
        This link will expire in <span th:text="${hours}">24</span> hour<span th:if="${hours > 1}">s</span>.
    </p>
</th:block>

</html>
