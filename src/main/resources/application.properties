# server config
spring.application.name=dashboard_oauth
server.port=8081

logging.level.org.springframework.boot.autoconfigure.mongo=DEBUG

# MongoDB - override in application-local.properties or via SPRING_DATA_MONGODB_URI env var
spring.mongodb.uri=mongodb+srv://${MONGO_USER}:${MONGO_PASSWORD}@${MONGO_HOST}/${MONGO_DB}?retryWrites=true&w=majority

# grafana
grafana.apiKey=${GRAFANA_USER_ID}:${GRAFANA_TOKEN}
grafana.url=${GRAFANA_URL}

#JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}
spring.security.oauth2.secret=${SPRING_SECURITY_OAUTH2_SECRET}

#resend
resend.apiKey=${RESEND_APIKEY}

#default email values
email.baseUrl=${EMAIL_BASE_URL}
email.fromAddress=${EMAIL_FROM_ADDRESS}
email.verificationTokenExpirationMs=${EMAIL_VERIFICATION_TOKEN_EXPIRATION_MS}
email.passwordResetTokenExpirationMs=${PASSWORD_RESET_TOKEN_EXPIRATION_MS}

# R2 configuration
r2.accessKeyId=${R2_ACCESS_KEY_ID}
r2.secretAccessKey=${R2_SECRET_ACCESS_KEY}
r2.accountId=${R2_ACCOUNT_ID}
r2.bucketName=${R2_BUCKET_NAME}
r2.publicUrl=${R2_PUBLIC_URL}

# Lockout configuration
login.maxFailedAttempts=${SPRING_SECURITY_OAUTH2_MAX_LOGIN_ATTEMPTS}

spring.security.oauth2.login-url=${SPRING_SECURITY_OAUTH2_LOGIN_URL}

# OIDC
oidc.issuer=${SPRING_SECURITY_OIDC_ISSUER}
