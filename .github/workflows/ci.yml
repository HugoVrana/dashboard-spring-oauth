name: CI/CD Pipeline

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  MAVEN_CLI_OPTS: "-B"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Configure Maven settings
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<XML
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>${{ github.actor }}</username>
                <password>${{ secrets.GITHUB_TOKEN }}</password>
              </server>
            </servers>
          </settings>
          XML

      - name: Build with Maven
        run: mvn $MAVEN_CLI_OPTS clean package -DskipTests

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: target
          path: target/
          retention-days: 1

  unit-test:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: read
      checks: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Configure Maven settings
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<XML
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>${{ github.actor }}</username>
                <password>${{ secrets.GITHUB_TOKEN }}</password>
              </server>
            </servers>
          </settings>
          XML

      - name: Run unit tests
        run: mvn $MAVEN_CLI_OPTS test -Dtest="!**.integration.**"

      - name: Generate Allure report
        if: always()
        run: mvn $MAVEN_CLI_OPTS allure:report
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-results
          path: |
            target/surefire-reports/
            target/site/allure-maven-plugin/
          retention-days: 7

      - name: Publish Test Report
        if: always()
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: 'target/surefire-reports/TEST-*.xml'
          check_name: 'Unit Test Results'

  integration-test:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: read
      checks: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Configure Maven settings
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<XML
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>${{ github.actor }}</username>
                <password>${{ secrets.GITHUB_TOKEN }}</password>
              </server>
            </servers>
          </settings>
          XML

      - name: Run integration tests
        run: mvn $MAVEN_CLI_OPTS test -Dtest="**.integration.**"

      - name: Generate Allure report
        if: always()
        run: mvn $MAVEN_CLI_OPTS allure:report
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-results
          path: |
            target/surefire-reports/
            target/site/allure-maven-plugin/
          retention-days: 7

      - name: Publish Test Report
        if: always()
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: 'target/surefire-reports/TEST-*.xml'
          check_name: 'Integration Test Results'

  lint:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Configure Maven settings
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<XML
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>${{ github.actor }}</username>
                <password>${{ secrets.GITHUB_TOKEN }}</password>
              </server>
            </servers>
          </settings>
          XML

      - name: Run Checkstyle
        run: mvn $MAVEN_CLI_OPTS checkstyle:check

  dependency-scan:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'dashboard-spring-oauth'
          path: '.'
          format: 'HTML'
          args: >
            --scan pom.xml
            --enableExperimental

      - name: Upload Dependency Check Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dependency-check-report
          path: reports/
          retention-days: 7

  deploy:
    runs-on: ubuntu-latest
    needs: [unit-test, integration-test]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    environment: production
    permissions:
      contents: read
    steps:
      - name: Check production secret availability
        run: |
          check_secret() {
            local name="$1"
            local value="$2"
            if [ -n "$value" ]; then
              echo "$name=SET"
            else
              echo "$name=MISSING"
            fi
          }

          echo "Checking GitHub environment/repository secrets expected by the app and deploy job"
          check_secret "RENDER_DEPLOY_HOOK_URL" "$RENDER_DEPLOY_HOOK_URL"
          check_secret "JWT_SECRET" "$JWT_SECRET"
          check_secret "JWT_EXPIRATION" "$JWT_EXPIRATION"
          check_secret "JWT_REFRESH_EXPIRATION" "$JWT_REFRESH_EXPIRATION"
          check_secret "SPRING_SECURITY_OAUTH2_SECRET" "$SPRING_SECURITY_OAUTH2_SECRET"
          check_secret "SPRING_SECURITY_OIDC_ISSUER" "$SPRING_SECURITY_OIDC_ISSUER"
          check_secret "OIDC_ISSUER" "$OIDC_ISSUER"
          check_secret "RESEND_APIKEY" "$RESEND_APIKEY"
          check_secret "R2_ACCESS_KEY_ID" "$R2_ACCESS_KEY_ID"
          check_secret "R2_SECRET_ACCESS_KEY" "$R2_SECRET_ACCESS_KEY"
          check_secret "R2_SECRET_ACESS_KEY" "$R2_SECRET_ACESS_KEY"
          check_secret "R2_ACCOUNT_ID" "$R2_ACCOUNT_ID"
          check_secret "R2_BUCKET_NAME" "$R2_BUCKET_NAME"
          check_secret "R2_PUBLIC_URL" "$R2_PUBLIC_URL"
          check_secret "GRAFANA_API_KEY" "$GRAFANA_API_KEY"
          check_secret "GRAFANA_USER_ID" "$GRAFANA_USER_ID"
          check_secret "GRAFANA_TOKEN" "$GRAFANA_TOKEN"
          check_secret "GRAFANA_URL" "$GRAFANA_URL"
          check_secret "MONGO_USER" "$MONGO_USER"
          check_secret "MONGO_PASSWORD" "$MONGO_PASSWORD"
          check_secret "MONGO_HOST" "$MONGO_HOST"
          check_secret "MONGO_DB" "$MONGO_DB"
          check_secret "EMAIL_BASE_URL" "$EMAIL_BASE_URL"
          check_secret "EMAIL_FROM_ADDRESS" "$EMAIL_FROM_ADDRESS"
          check_secret "EMAIL_VERIFICATION_TOKEN_EXPIRATION_MS" "$EMAIL_VERIFICATION_TOKEN_EXPIRATION_MS"
          check_secret "PASSWORD_RESET_TOKEN_EXPIRATION_MS" "$PASSWORD_RESET_TOKEN_EXPIRATION_MS"
          check_secret "SPRING_SECURITY_OAUTH2_MAX_LOGIN_ATTEMPTS" "$SPRING_SECURITY_OAUTH2_MAX_LOGIN_ATTEMPTS"
          check_secret "SPRING_SECURITY_OAUTH2_LOGIN_URL" "$SPRING_SECURITY_OAUTH2_LOGIN_URL"
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRATION: ${{ secrets.JWT_EXPIRATION }}
          JWT_REFRESH_EXPIRATION: ${{ secrets.JWT_REFRESH_EXPIRATION }}
          SPRING_SECURITY_OAUTH2_SECRET: ${{ secrets.SPRING_SECURITY_OAUTH2_SECRET }}
          SPRING_SECURITY_OIDC_ISSUER: ${{ secrets.SPRING_SECURITY_OIDC_ISSUER }}
          OIDC_ISSUER: ${{ secrets.OIDC_ISSUER }}
          RESEND_APIKEY: ${{ secrets.RESEND_APIKEY }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_SECRET_ACESS_KEY: ${{ secrets.R2_SECRET_ACESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
          GRAFANA_API_KEY: ${{ secrets.GRAFANA_API_KEY }}
          GRAFANA_USER_ID: ${{ secrets.GRAFANA_USER_ID }}
          GRAFANA_TOKEN: ${{ secrets.GRAFANA_TOKEN }}
          GRAFANA_URL: ${{ secrets.GRAFANA_URL }}
          MONGO_USER: ${{ secrets.MONGO_USER }}
          MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}
          MONGO_HOST: ${{ secrets.MONGO_HOST }}
          MONGO_DB: ${{ secrets.MONGO_DB }}
          EMAIL_BASE_URL: ${{ secrets.EMAIL_BASE_URL }}
          EMAIL_FROM_ADDRESS: ${{ secrets.EMAIL_FROM_ADDRESS }}
          EMAIL_VERIFICATION_TOKEN_EXPIRATION_MS: ${{ secrets.EMAIL_VERIFICATION_TOKEN_EXPIRATION_MS }}
          PASSWORD_RESET_TOKEN_EXPIRATION_MS: ${{ secrets.PASSWORD_RESET_TOKEN_EXPIRATION_MS }}
          SPRING_SECURITY_OAUTH2_MAX_LOGIN_ATTEMPTS: ${{ secrets.SPRING_SECURITY_OAUTH2_MAX_LOGIN_ATTEMPTS }}
          SPRING_SECURITY_OAUTH2_LOGIN_URL: ${{ secrets.SPRING_SECURITY_OAUTH2_LOGIN_URL }}
      - name: Trigger Render Deploy
        run: |
          echo "Triggering deployment..."
          curl --fail-with-body -X POST "$RENDER_DEPLOY_HOOK_URL"
          echo "Deploy triggered successfully."
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
