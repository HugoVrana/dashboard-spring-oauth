name: CI/CD Pipeline

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  MAVEN_CLI_OPTS: "-B"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Configure Maven settings
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<XML
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>${{ github.actor }}</username>
                <password>${{ secrets.GITHUB_TOKEN }}</password>
              </server>
            </servers>
          </settings>
          XML

      - name: Build with Maven
        run: mvn $MAVEN_CLI_OPTS clean package -DskipTests

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: target
          path: target/
          retention-days: 1

  unit-test:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: read
      checks: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Configure Maven settings
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<XML
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>${{ github.actor }}</username>
                <password>${{ secrets.GITHUB_TOKEN }}</password>
              </server>
            </servers>
          </settings>
          XML

      - name: Run unit tests
        run: mvn $MAVEN_CLI_OPTS test -Dtest="!**.integration.**"

      - name: Generate Allure report
        if: always()
        run: mvn $MAVEN_CLI_OPTS allure:report
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: |
            target/surefire-reports/
            target/site/allure-maven-plugin/
          retention-days: 7

      - name: Publish Test Report
        if: always()
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: 'target/surefire-reports/TEST-*.xml'
          check_name: 'Unit Test Results'

  integration-test:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: read
      checks: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Configure Maven settings
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<XML
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>${{ github.actor }}</username>
                <password>${{ secrets.GITHUB_TOKEN }}</password>
              </server>
            </servers>
          </settings>
          XML

      - name: Run integration tests
        run: mvn $MAVEN_CLI_OPTS test -Dtest="**.integration.**"

      - name: Generate Allure report
        if: always()
        run: mvn $MAVEN_CLI_OPTS allure:report
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: |
            target/surefire-reports/
            target/site/allure-maven-plugin/
          retention-days: 7

      - name: Publish Test Report
        if: always()
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: 'target/surefire-reports/TEST-*.xml'
          check_name: 'Integration Test Results'

  lint:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Configure Maven settings
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<XML
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>${{ github.actor }}</username>
                <password>${{ secrets.GITHUB_TOKEN }}</password>
              </server>
            </servers>
          </settings>
          XML

      - name: Run Checkstyle
        run: mvn $MAVEN_CLI_OPTS checkstyle:check

  dependency-scan:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'dashboard-spring-oauth'
          path: '.'
          format: 'HTML'
          args: >
            --scan pom.xml
            --enableExperimental

      - name: Upload Dependency Check Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: reports/
          retention-days: 7

  deploy:
    runs-on: ubuntu-latest
    needs: [unit-test, integration-test]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    environment: production
    permissions:
      contents: read
    steps:
      - name: Trigger Render Deploy
        run: |
          echo "Triggering deployment..."
          curl -X PUT "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/env-vars" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '[
              {"key": "GRAFANA_API_KEY", "value": "'"${GRAFANA_API_KEY}"'"},
              {"key": "JWT_EXPIRATION", "value": "'"${JWT_EXPIRATION}"'"},
              {"key": "JWT_REFRESH_EXPIRATION", "value": "'"${JWT_REFRESH_EXPIRATION}"'"},
              {"key": "JWT_SECRET", "value": "'"${JWT_SECRET}"'"},
              {"key": "OIDC_ISSUER", "value": "'"${OIDC_ISSUER}"'"},
              {"key": "R2_ACCESS_KEY_ID", "value": "'"${R2_ACCESS_KEY_ID}"'"},
              {"key": "R2_ACCOUNT_ID", "value": "'"${R2_ACCOUNT_ID}"'"},
              {"key": "R2_BUCKET_NAME", "value": "'"${R2_BUCKET_NAME}"'"},
              {"key": "R2_SECRET_ACCESS_KEY", "value": "'"${R2_SECRET_ACCESS_KEY}"'"},
              {"key": "RESEND_APIKEY", "value":"'"${RESEND_APIKEY}"'"},
              {"key": “SPRING_SECURITY_OAUTH2_SECRET", "value":"'"${SPRING_SECURITY_OAUTH2_SECRET}"'"},
              {"key": “EMAIL_BASEURL", "value":"'"${EMAIL_BASEURL}"'"},
              {"key": “EMAIL_FROMADDRESS", "value":"'"${EMAIL_FROMADDRESS}"'"},
              {"key": “EMAIL_VERIFICATIONTOKENEXPIRATIONMS", "value":"'"${EMAIL_VERIFICATIONTOKENEXPIRATIONMS}"'"},
              {"key": “GRAFANA_URL", "value":"'"${GRAFANA_URL}"'"},
              {"key": “SPRING_DATA_MONGODB_URI", "value":"'"${SPRING_DATA_MONGODB_URI}"'"}
            ]'
          echo "Deploy triggered successfully."
