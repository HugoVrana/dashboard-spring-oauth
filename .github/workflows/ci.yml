name: CI/CD Pipeline

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  MAVEN_CLI_OPTS: "-B"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Configure Maven settings
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<XML
          <settings>
            <profiles>
              <profile>
                <id>gitlab-registry</id>
                <repositories>
                  <repository>
                    <id>common-lib</id>
                    <url>https://gitlab.com/api/v4/groups/${{ secrets.GROUP_ID }}/-/packages/maven</url>
                  </repository>
                  <repository>
                    <id>central</id>
                    <url>https://repo.maven.apache.org/maven2</url>
                  </repository>
                </repositories>
              </profile>
            </profiles>
            <activeProfiles>
              <activeProfile>gitlab-registry</activeProfile>
            </activeProfiles>
            <servers>
              <server>
                <id>common-lib</id>
                <username>Private-Token</username>
                <password>${{ secrets.GITLAB_TOKEN }}</password>
              </server>
            </servers>
          </settings>
          XML

      - name: Build with Maven
        run: mvn $MAVEN_CLI_OPTS clean package -DskipTests

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: target
          path: target/
          retention-days: 1

  unit-test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Configure Maven settings
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<XML
          <settings>
            <profiles>
              <profile>
                <id>gitlab-registry</id>
                <repositories>
                  <repository>
                    <id>common-lib</id>
                    <url>https://gitlab.com/api/v4/groups/${{ secrets.GROUP_ID }}/-/packages/maven</url>
                  </repository>
                  <repository>
                    <id>central</id>
                    <url>https://repo.maven.apache.org/maven2</url>
                  </repository>
                </repositories>
              </profile>
            </profiles>
            <activeProfiles>
              <activeProfile>gitlab-registry</activeProfile>
            </activeProfiles>
            <servers>
              <server>
                <id>common-lib</id>
                <username>Private-Token</username>
                <password>${{ secrets.GITLAB_TOKEN }}</password>
              </server>
            </servers>
          </settings>
          XML

      - name: Run unit tests
        run: mvn $MAVEN_CLI_OPTS test -Dtest="!**.integration.**"

      - name: Generate Allure report
        if: always()
        run: mvn $MAVEN_CLI_OPTS allure:report
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: |
            target/surefire-reports/
            target/site/allure-maven-plugin/
          retention-days: 7

      - name: Publish Test Report
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: 'target/surefire-reports/TEST-*.xml'
          check_name: 'Unit Test Results'

  integration-test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Configure Maven settings
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<XML
          <settings>
            <profiles>
              <profile>
                <id>gitlab-registry</id>
                <repositories>
                  <repository>
                    <id>common-lib</id>
                    <url>https://gitlab.com/api/v4/groups/${{ secrets.GROUP_ID }}/-/packages/maven</url>
                  </repository>
                  <repository>
                    <id>central</id>
                    <url>https://repo.maven.apache.org/maven2</url>
                  </repository>
                </repositories>
              </profile>
            </profiles>
            <activeProfiles>
              <activeProfile>gitlab-registry</activeProfile>
            </activeProfiles>
            <servers>
              <server>
                <id>common-lib</id>
                <username>Private-Token</username>
                <password>${{ secrets.GITLAB_TOKEN }}</password>
              </server>
            </servers>
          </settings>
          XML

      - name: Run integration tests
        run: mvn $MAVEN_CLI_OPTS test -Dtest="**.integration.**"

      - name: Generate Allure report
        if: always()
        run: mvn $MAVEN_CLI_OPTS allure:report
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: |
            target/surefire-reports/
            target/site/allure-maven-plugin/
          retention-days: 7

      - name: Publish Test Report
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: 'target/surefire-reports/TEST-*.xml'
          check_name: 'Integration Test Results'

  lint:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Lint code
        run: |
          echo "Linting code..."
          echo "No lint issues found."

  dependency-scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'dashboard-spring-oauth'
          path: '.'
          format: 'HTML'
          args: >
            --scan pom.xml
            --enableExperimental

      - name: Upload Dependency Check Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: reports/
          retention-days: 7

  deploy:
    runs-on: ubuntu-latest
    needs: [unit-test, integration-test]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    environment: production
    steps:
      - name: Trigger Render Deploy
        run: |
          echo "Triggering deployment..."
          echo "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"<
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          echo "Deploy triggered successfully."
